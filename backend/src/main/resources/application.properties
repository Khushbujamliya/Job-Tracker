spring.application.name=job-tracker

# --- MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/job_tracker?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
server.port=8080

# --- JWT ---
# Use a long, random secret in real projects (this is a placeholder for local dev)
jwt.secret=ThisIsASecretKeyForJWTPleaseChangeMeInProductionOk123456
jwt.expiration.ms=86400000

# --- Email (for follow-up reminders) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# How many days an application sits in APPLIED status before we remind the user
reminder.days-before-followup=${REMINDER_DAYS:7}